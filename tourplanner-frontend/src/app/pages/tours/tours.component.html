<div class="flex flex-col h-screen bg-surface">
  
  <header class="bg-primary text-white px-6 h-16 flex items-center justify-between shrink-0 shadow-lg">
    <div class="flex items-center gap-3">
      <svg class="w-7 h-7 text-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l5.447 2.724A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
      </svg>
      <h1 class="m-0 text-xl font-display tracking-wide">Tour Planner</h1>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-sm text-info-light opacity-80 font-light hidden sm:block">{{ authService.userEmail() }}</span>
      <button
        class="px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white text-sm font-medium rounded-lg transition-colors cursor-pointer border border-white/20"
        (click)="authService.logout()">
        Logout
      </button>
    </div>
  </header>
  <main class="flex flex-1 overflow-hidden">
    <aside class="w-80 min-w-60 border-r border-surface-dark bg-white overflow-y-auto shrink-0 shadow-sm">
      <app-tour-list
        [tours]="tours()"
        [selectedTourId]="selectedTour()?.id ?? null"
        (selectTour)="selectTour($event)"
        (addTour)="openAddTour()" />
    </aside>

    <section class="flex-1 bg-surface overflow-y-auto">
      <app-tour-detail
        [tour]="selectedTour()"
        [logs]="tourLogs()"
        (editTour)="openEditTour()"
        (deleteTour)="requestDeleteTour()"
        (addLog)="openAddLog()"
        (editLog)="openEditLog($event)"
        (deleteLog)="requestDeleteLog($event)" />
    </section>
  </main>
</div>

@if (showTourForm()) {
  <app-tour-form
    [tour]="editingTour()"
    (save)="saveTour($event)"
    (cancel)="showTourForm.set(false)" />
}

@if (showLogForm()) {
  <app-tour-log-form
    [log]="editingLog()"
    (save)="saveLog($event)"
    (cancel)="showLogForm.set(false)" />
}

@if (showConfirm()) {
  <app-confirm-dialog
    [message]="confirmMessage()"
    (confirm)="onConfirm()"
    (cancel)="onCancelConfirm()" />
}
