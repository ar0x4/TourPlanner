<div class="h-full flex flex-col">
  
  <div class="flex justify-between items-center px-5 py-4 border-b border-surface-dark">
    <h2 class="m-0 text-lg font-display text-primary">Tours</h2>
    <button
      class="inline-flex items-center gap-1.5 px-4 py-2 bg-primary hover:bg-primary-dark text-white text-sm font-semibold rounded-lg transition-all duration-200 hover:shadow-md cursor-pointer border-none"
      (click)="addTour.emit()">
      <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
        <path d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"/>
      </svg>
      Add Tour
    </button>
  </div>

  @if (tours().length === 0) {
    
    <div class="flex-1 flex flex-col items-center justify-center px-6 py-12 text-center">
      <div class="w-16 h-16 bg-info-light/30 rounded-full flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l5.447 2.724A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
        </svg>
      </div>
      <p class="text-muted font-medium mb-1">No tours yet</p>
      <p class="text-muted-light text-sm">Create your first adventure to get started.</p>
    </div>
  } @else {
    
    <div class="flex-1 overflow-y-auto py-2">
      @for (tour of tours(); track tour.id) {
        <div
          class="group flex items-center gap-3 mx-2 mb-1 px-4 py-3 rounded-lg cursor-pointer transition-all duration-200"
          [class]="tour.id === selectedTourId()
            ? 'bg-primary/10 border-l-[3px] border-l-primary shadow-sm'
            : 'hover:bg-surface-dark border-l-[3px] border-l-transparent'"
          (click)="selectTour.emit(tour)">
          <div class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform duration-200"
               [class]="transportColor(tour.transportType)">
            <i [class]="transportIcon(tour.transportType)" class="text-base"></i>
          </div>
          <div class="flex flex-col min-w-0">
            <span class="font-semibold text-ink truncate text-[0.9rem]">{{ tour.name }}</span>
            <span class="text-xs text-muted-light capitalize">{{ tour.transportType }}</span>
          </div>
          @if (tour.distance) {
            <span class="ml-auto text-xs text-muted bg-surface-dark rounded-full px-2 py-0.5 shrink-0">{{ tour.distance }} km</span>
          }
        </div>
      }
    </div>
  }
</div>
